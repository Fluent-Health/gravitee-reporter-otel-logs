receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  resource:
    attributes:
      - action: upsert
        key: service.name
        value: "gravitee-otellogs"

# We use the `debug` exporter at verbosity=detailed so the E2E test can verify
# log record content by tailing the collector's stdout. This avoids running a
# storage backend (e.g. Loki) just for verification.
exporters:
  debug:
    verbosity: detailed

service:
  telemetry:
    logs:
      # Quiet down the collector's own internal logs; we only want exporter output.
      level: info
  pipelines:
    logs:
      receivers: [otlp]
      processors: [resource]
      exporters: [debug]
