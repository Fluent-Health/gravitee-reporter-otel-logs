name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # required for GCP Workload Identity Federation
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Extract version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set Maven version
        run: |
          mvn --batch-mode versions:set \
              -DnewVersion=${{ steps.version.outputs.version }} \
              -DgenerateBackupPoms=false

      - name: Unit tests
        run: mvn test --batch-mode -q

      - name: Integration tests (TestContainers — OTel Collector + Loki)
        run: mvn verify -Pintegration-test --batch-mode -q

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GHA_WIF_PROVIDER }}
          service_account: ${{ vars.GHA_SERVICE_ACCOUNT }}

      - name: Integration tests (Google Cloud Logging — live write + readback)
        run: mvn verify -Pgcloud-integration-test --batch-mode -q
        env:
          GOOGLE_CLOUD_PROJECT: ${{ vars.GCP_PROJECT_ID }}

      - name: Build plugin ZIP
        run: |
          mvn package -DskipTests --batch-mode -q

      - name: Upload ZIP to GitHub Release
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            target/gravitee-reporter-otellogs-${{ steps.version.outputs.version }}.zip \
            --clobber
